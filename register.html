<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
      --primary: #6366f1;
      --accent: #facc15;
      --bg: linear-gradient(135deg, #8b89a0, #354d72);
      --glass: rgba(255, 255, 255, 0.1);
      --white: #fff;
      --text: #e5e7eb;
      --blur: blur(12px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--bg);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
    }

    .card {
      width: auto;
      /* height: 40%; */
      max-width: 420px;
      background: var(--glass);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: transform 0.4s ease;
    }

    .card:hover {
      transform: scale(1.03);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 2rem;
      color: var(--white);
    }

    input, textarea {
      width: 100%;
      /* max-width:350px; */
      padding: 12px 15px;
      margin: 10px 0 20px 0;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      background-color: rgba(255, 255, 255, 0.15);
      color: var(--white);
      outline: none;
    }

    input::placeholder, textarea::placeholder {
      color: #d1d5db;
    }
    textarea{
      resize: none;
      height: 5rem;
    }

    button.btn {
      width: 100%;
      padding: 12px;
      background-color: var(--accent);
      color: #1f2937;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button.btn:hover {
      background-color: #eab308;
      transform: translateY(-2px);
    }
    section.hero{
      height: 100vh;
    }
    main{
      flex: 1;
    }
    </style>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
          <div class="logo">
            <img src="favicon.png" alt="Logo"> <br>
            </div>
          <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <!-- <li><a href="#features">Features</a></li> -->
            <!-- <li><a href="#members">Members</a></li> -->
            <!-- <li><a href="#members">Events</a></li> -->
            <!-- <li><a href="#join">Join</a></li> -->
          </ul>
          <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
        </div>
      </nav>
      <main>
<section class="hero">
<form action="" onsubmit="" class="card">
    <h2> Fill your Information</h2>
    <input type="text" placeholder="Name" required>
    <input type="tel" placeholder="Contact Number" required>
    <input type="text" placeholder="Session" required>
    <input type="text" placeholder="Section" required>
    <textarea name="message" id="message" class="message"placeholder="Message"></textarea>
    <button class="btn" type="submit">Submit</button>
</form>    
</section>
</main>

<script>
    // Mobile menu toggle
    document.querySelector('.mobile-menu-btn')?.addEventListener('click', () => {
        document.querySelector('.nav-links')?.classList.toggle('active');
      });

      // Smooth scroll
      document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
          e.preventDefault();
          document.querySelector(this.getAttribute('href'))?.scrollIntoView({
            behavior: 'smooth'
          });
        });
      });
       // Fetch footer
  fetch('footer.html')
    .then(response => response.text())
    .then(data => {
      document.body.insertAdjacentHTML('beforeend', data);
    });
    
</script>
</body>
</html>
